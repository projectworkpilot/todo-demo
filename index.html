<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo App</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #111827;
            padding: 20px;
            box-sizing: border-box;
        }

        .app {
            width: min(100%, 480px);
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.6rem;
            text-align: center;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 1rem;
            background: #4f46e5;
            color: white;
        }

        button:hover {
            background: #4338ca;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f9fafb;
        }

        .task-main {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .task-main input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: #6b7280;
        }

        .delete-btn {
            background: #ef4444;
            padding: 6px 10px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .empty {
            text-align: center;
            color: #6b7280;
            padding: 12px 0;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>Todo App</h1>
        <div class="input-row">
            <input id="taskInput" type="text" placeholder="Add a task" />
            <button id="addBtn">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        let tasks = JSON.parse(localStorage.getItem('simple-todos') || '[]');

        function saveTasks() {
            localStorage.setItem('simple-todos', JSON.stringify(tasks));
        }

        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                const empty = document.createElement('li');
                empty.className = 'empty';
                empty.textContent = 'No tasks yet. Add one above.';
                taskList.appendChild(empty);
                return;
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
          <div class="task-main">
            <input type="checkbox" ${task.done ? 'checked' : ''} />
            <span class="${task.done ? 'completed' : ''}">${task.text}</span>
          </div>
          <button class="delete-btn">Delete</button>
        `;

                const checkbox = li.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', () => {
                    tasks[index].done = checkbox.checked;
                    saveTasks();
                    renderTasks();
                });

                li.querySelector('.delete-btn').addEventListener('click', () => {
                    tasks.splice(index, 1);
                    saveTasks();
                    renderTasks();
                });

                taskList.appendChild(li);
            });
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;

            tasks.unshift({ text, done: false });
            saveTasks();
            taskInput.value = '';
            renderTasks();
            taskInput.focus();
        }

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') addTask();
        });

        renderTasks();
    </script>
</body>

</html>
